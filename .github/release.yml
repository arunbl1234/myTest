changelog:
  categories:
    - title: '🚀 Features'
      labels:
        - 'feature'
        - 'enhancement'
    - title: '🐛 Bug Fixes'
      labels:
        - 'fix'
        - 'bug'
    - title: '🧰 Maintenance'
      labels:
        - 'chore'
        - 'maintenance'
        - 'dependencies'
  exclude:
    labels:
      - 'ignore-for-release'
